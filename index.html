<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 卡网入口</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <style>
    :root {
      --bg-main: #f6f8ff;
      --bg-soft: #eef3ff;
      --text-main: #101828;
      --text-muted: #667085;
      --line: rgba(16, 24, 40, 0.10);
      --blue: #4f8cff;
      --purple: #8b5cf6;
      --cyan: #54d6ff;
      --shadow: 0 28px 80px rgba(44, 62, 110, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 18%, rgba(79, 140, 255, 0.22), transparent 30%),
        radial-gradient(circle at 82% 24%, rgba(139, 92, 246, 0.16), transparent 30%),
        radial-gradient(circle at 48% 92%, rgba(84, 214, 255, 0.18), transparent 34%),
        linear-gradient(135deg, #ffffff, var(--bg-main) 46%, var(--bg-soft));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79, 140, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 140, 255, 0.055) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black, transparent 74%);
      opacity: 0.5;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 0;
    }

    .window {
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.66));
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .traffic-bar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 22px;
      border-bottom: 1px solid rgba(16, 24, 40, 0.07);
      background: rgba(255, 255, 255, 0.58);
    }

    .traffic-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(16, 24, 40, 0.08);
    }

    .traffic-dot.red { background: #ff5f57; }
    .traffic-dot.yellow { background: #ffbd2e; }
    .traffic-dot.green { background: #28c840; }

    .content {
      position: relative;
      padding: 58px 46px 44px;
    }

    .content::after {
      content: "";
      position: absolute;
      inset: 26px;
      z-index: -1;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 20%, rgba(79, 140, 255, 0.13), transparent 36%),
        radial-gradient(circle at 88% 72%, rgba(139, 92, 246, 0.10), transparent 32%);
    }

    .header {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 34px;
    }

    .site-logo {
      display: block;
      width: clamp(104px, 16vw, 148px);
      height: clamp(104px, 16vw, 148px);
      margin: 0 auto 22px;
      object-fit: contain;
      border-radius: 30px;
      box-shadow: 0 18px 46px rgba(44, 62, 110, 0.14);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 20px;
      border: 1px solid rgba(79, 140, 255, 0.18);
      border-radius: 999px;
      color: #3f5f9c;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 30px rgba(44, 62, 110, 0.08);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      box-shadow: 0 0 14px rgba(79, 140, 255, 0.6);
    }

    h1 {
      font-size: clamp(42px, 7vw, 72px);
      line-height: 1.04;
      letter-spacing: -0.06em;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .gradient-text {
      background: linear-gradient(90deg, #111827, #315fcb 52%, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.8;
    }

    .brand-panel {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.50);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    .brand-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .brand {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 14px;
      border: 1px solid rgba(16, 24, 40, 0.085);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.62));
      color: #172033;
      font-size: 16px;
      font-weight: 720;
      letter-spacing: -0.01em;
      text-align: center;
      box-shadow: 0 14px 34px rgba(44, 62, 110, 0.08);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .brand:hover {
      transform: translateY(-3px);
      border-color: rgba(79, 140, 255, 0.26);
      box-shadow: 0 18px 42px rgba(44, 62, 110, 0.13);
    }

    .route-panel {
      width: min(760px, 100%);
      margin: 24px auto 22px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .route-copy {
      text-align: center;
      margin: 0 auto;
    }

    .route-title {
      margin-bottom: 8px;
      color: #172033;
      font-size: 19px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .route-text {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.7;
      letter-spacing: 0;
    }

    .route-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .primary-button {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
      min-height: 76px;
      padding: 13px 20px;
      border: 1px solid rgba(79, 140, 255, 0.24);
      border-radius: 22px;
      color: #ffffff;
      background: linear-gradient(135deg, #336dff, #7c3aed);
      font-size: 17px;
      font-weight: 780;
      line-height: 1.2;
      letter-spacing: 0;
      text-decoration: none;
      box-shadow: 0 16px 34px rgba(79, 140, 255, 0.28);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .primary-button.secondary {
      border-color: rgba(18, 184, 134, 0.28);
      background: linear-gradient(135deg, #0ea5a4, #22c55e);
      box-shadow: 0 16px 34px rgba(18, 184, 134, 0.22);
    }

    .button-label {
      font-size: 18px;
      font-weight: 800;
    }

    .button-meta {
      font-size: 13px;
      font-weight: 650;
      opacity: 0.9;
    }

    .primary-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 46px rgba(79, 140, 255, 0.36);
      filter: brightness(1.05);
    }

    .primary-button:active {
      transform: translateY(0);
    }

    .primary-button.is-disabled,
    .primary-button.is-disabled:hover {
      border-color: var(--line);
      color: rgba(16, 24, 40, 0.46);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: none;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .footer-note {
      text-align: center;
      color: rgba(16, 24, 40, 0.48);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.38;
      pointer-events: none;
    }

    .orb.one {
      width: 210px;
      height: 210px;
      left: -60px;
      top: 80px;
      background: rgba(79, 140, 255, 0.42);
    }

    .orb.two {
      width: 230px;
      height: 230px;
      right: -70px;
      bottom: 50px;
      background: rgba(139, 92, 246, 0.30);
    }

    @media (max-width: 780px) {
      .page {
        width: min(100% - 28px, 1080px);
        padding: 34px 0;
      }

      .window {
        border-radius: 28px;
      }

      .content {
        padding: 40px 18px 30px;
      }

      .traffic-bar {
        height: 44px;
        padding: 0 18px;
      }

      .header {
        margin-bottom: 26px;
      }

      .site-logo {
        width: 100px;
        height: 100px;
        margin-bottom: 18px;
        border-radius: 24px;
      }

      .brand-panel {
        padding: 14px;
        border-radius: 24px;
      }

      .brand-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .brand {
        min-height: 66px;
        border-radius: 18px;
        font-size: 15px;
      }

      .route-panel {
        padding: 18px;
        border-radius: 24px;
      }

      .route-actions {
        grid-template-columns: 1fr;
      }

      .primary-button {
        min-height: 70px;
      }
    }

    @media (max-width: 380px) {
      .brand-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="window" aria-label="AI 聚合入口页面">
      <div class="traffic-bar" aria-hidden="true">
        <span class="traffic-dot red"></span>
        <span class="traffic-dot yellow"></span>
        <span class="traffic-dot green"></span>
      </div>

      <div class="content">
        <div class="orb one"></div>
        <div class="orb two"></div>

        <header class="header">
          <img class="site-logo" src="logo.png" alt="哈基米 AI" width="148" height="148" />
          <div class="eyebrow"><span class="dot"></span> Overseas AI Portal</div>
          <h1><span class="gradient-text">哈基米 AI 卡网入口</span></h1>
          <p class="subtitle">按需要购买的 AI 工具选择对应卡网入口。</p>
        </header>

        <section class="brand-panel" aria-label="海外 AI 品牌列表">
          <div class="brand-grid">
            <div class="brand">ChatGPT</div>
            <div class="brand">Grok</div>
            <div class="brand">Gemini</div>
            <div class="brand">Claude</div>
          </div>
        </section>

        <section class="route-panel" aria-label="卡网入口选择">
          <div class="route-copy">
            <p class="route-title">按购买工具选择入口</p>
            <p class="route-text">买 Claude、ChatGPT、Grok 走卡网 1；买 Gemini 走卡网 2。</p>
          </div>

          <div class="route-actions">
            <a class="primary-button" id="goCard1" href="https://catfk.com/shop/hajimi" rel="noopener">
              <span class="button-label">前往卡网 1</span>
              <span class="button-meta">Claude / ChatGPT / Grok </span>
            </a>
            <a class="primary-button secondary" id="goCard2" href="#" rel="noopener">
              <span class="button-label">前往卡网 2</span>
              <span class="button-meta">Gemini </span>
            </a>
          </div>
        </section>

        <p class="footer-note"></p>
      </div>
    </section>
  </main>

  <script>
    // 修改这里即可更换两个卡网的跳转链接
    const CARD_NET_1_URL = "https://catfk.com/shop/hajimi";
    const CARD_NET_2_URL = "https://pay.qxvx.cn/shop/hajimi";

    function setCardLink(id, url) {
      const button = document.getElementById(id);

      if (url) {
        button.href = url;
        return;
      }

      button.href = "#";
      button.classList.add("is-disabled");
      button.setAttribute("aria-disabled", "true");
      button.addEventListener("click", (event) => event.preventDefault());
    }

    setCardLink("goCard1", CARD_NET_1_URL);
    setCardLink("goCard2", CARD_NET_2_URL);
  </script>
</body>
</html>
